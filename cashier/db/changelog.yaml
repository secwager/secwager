databaseChangeLog:
  - changeSet:
      id: "001"
      author: secwager
      changes:
        - createTable:
            tableName: accounts
            columns:
              - column:
                  name: trader_id
                  type: VARCHAR(8)
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: balance
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: locked
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: version
                  type: BIGINT
                  defaultValueNumeric: 0
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP

        - sql:
            sql: "ALTER TABLE accounts ADD CONSTRAINT ck_balance CHECK (balance >= 0)"
        - sql:
            sql: "ALTER TABLE accounts ADD CONSTRAINT ck_locked CHECK (locked >= 0)"
        - sql:
            sql: "ALTER TABLE accounts ADD CONSTRAINT ck_coverage CHECK (balance >= locked)"

        - createTable:
            tableName: escrow_entries
            columns:
              - column:
                  name: order_id
                  type: BIGINT
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: trader_id
                  type: VARCHAR(8)
                  constraints:
                    nullable: false
                    foreignKeyName: fk_escrow_trader
                    references: "accounts(trader_id)"
              - column:
                  name: amount
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMPTZ
                  defaultValueComputed: CURRENT_TIMESTAMP

        - sql:
            sql: "ALTER TABLE escrow_entries ADD CONSTRAINT ck_escrow_amount CHECK (amount > 0)"

        - createIndex:
            tableName: escrow_entries
            indexName: idx_escrow_trader
            columns:
              - column:
                  name: trader_id
