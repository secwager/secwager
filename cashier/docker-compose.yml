services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       cashier
      POSTGRES_USER:     cashier
      POSTGRES_PASSWORD: cashier
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cashier -d cashier"]
      interval: 2s
      timeout: 5s
      retries: 10

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.17
    command:
      - etcd
      - --listen-client-urls=http://0.0.0.0:2379
      - --advertise-client-urls=http://etcd:2379
    healthcheck:
      test: ["CMD", "etcdctl", "--endpoints=http://localhost:2379", "endpoint", "health"]
      interval: 2s
      timeout: 5s
      retries: 10

  migrate:
    build:
      context: .
      target: migrate
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      LIQUIBASE_COMMAND_URL:            jdbc:postgresql://postgres:5432/cashier
      LIQUIBASE_COMMAND_USERNAME:       cashier
      LIQUIBASE_COMMAND_PASSWORD:       cashier
      LIQUIBASE_COMMAND_CHANGELOG_FILE: changelog.yaml
      LIQUIBASE_SEARCH_PATH:            /liquibase/changelog
    command: update

  cashier:
    build:
      context: .
      target: runtime
    depends_on:
      migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_healthy
    environment:
      CASHIER_PG_DSN:         host=postgres dbname=cashier user=cashier password=cashier
      CASHIER_ETCD_ENDPOINTS: http://etcd:2379
      CASHIER_LISTEN_ADDR:    0.0.0.0:50051
    ports:
      - "50051:50051"

  integration-test:
    build:
      context: .
      target: integration-test
    depends_on:
      migrate:
        condition: service_completed_successfully
      etcd:
        condition: service_healthy
    environment:
      CASHIER_PG_DSN:         host=postgres dbname=cashier user=cashier password=cashier
      CASHIER_ETCD_ENDPOINTS: http://etcd:2379
