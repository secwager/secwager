services:

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro,z
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10
    ports:
      - "5432:5432"

  cashier:
    build:
      context: .
      dockerfile: cashier/Dockerfile
    environment:
      CASHIER_PG_DSN: "host=postgres dbname=cashier user=postgres password=postgres sslmode=disable"
      CASHIER_LISTEN_ADDR: "0.0.0.0:50051"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50051:50051"

  registry:
    build:
      context: .
      dockerfile: registry/Dockerfile
    environment:
      REGISTRY_PG_DSN: "host=postgres dbname=registry user=postgres password=postgres sslmode=disable"
      REGISTRY_LISTEN_ADDR: "0.0.0.0:50053"
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50053:50053"

  userregistration:
    build:
      context: .
      dockerfile: userregistration/Dockerfile
    environment:
      USERREG_PG_DSN: "host=postgres dbname=userregistration user=postgres password=postgres sslmode=disable"
      USERREG_LISTEN_ADDR: "0.0.0.0:50052"
      USERREG_COGNITO_REGION: "${USERREG_COGNITO_REGION:-us-east-1}"
      USERREG_COGNITO_POOL_ID: "${USERREG_COGNITO_POOL_ID}"
      USERREG_KMS_KEY_ARN: "${USERREG_KMS_KEY_ARN}"
      USERREG_BTC_NETWORK: "${USERREG_BTC_NETWORK:-testnet}"
      AWS_PROFILE: "${AWS_PROFILE:-default}"
    volumes:
      - ${HOME}/.aws:/root/.aws:ro,z
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "50052:50052"

  vendor_refdata:
    build:
      context: .
      dockerfile: vendor_refdata/Dockerfile
    environment:
      VENDOR_REFDATA_PG_DSN: "host=postgres dbname=registry user=postgres password=postgres sslmode=disable"
      VENDOR_REFDATA_MIGRATIONS_PATH: "/db/migrations"
      APISPORTS_KEY: "${APISPORTS_KEY}"
      VENDOR_REFDATA_ROSTER_INTERVAL: "${VENDOR_REFDATA_ROSTER_INTERVAL:-24h}"
      VENDOR_REFDATA_SCHEDULE_INTERVAL: "${VENDOR_REFDATA_SCHEDULE_INTERVAL:-24h}"
      VENDOR_REFDATA_RESULTS_INTERVAL: "${VENDOR_REFDATA_RESULTS_INTERVAL:-1h}"
    depends_on:
      postgres:
        condition: service_healthy

  envoy:
    image: envoyproxy/envoy:v1.30-latest
    environment:
      ENVOY_UID: "0"  # SELinux blocks chown /dev/stdout even with CHOWN cap; run as root for local dev
    volumes:
      - ./ui/envoy/envoy.yaml:/etc/envoy/envoy.yaml:ro,z
    ports:
      - "8080:8080"
      - "9901:9901"
    depends_on:
      - cashier
      - registry
      - userregistration

volumes:
  pgdata:
