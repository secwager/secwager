syntax = "proto3";
package cashier;

service CashierService {
    rpc Deposit       (DepositRequest)       returns (CashierResponse);
    rpc Withdraw      (WithdrawRequest)      returns (CashierResponse);
    rpc Escrow        (EscrowRequest)        returns (CashierResponse);
    rpc ReleaseEscrow (ReleaseEscrowRequest) returns (CashierResponse);
    rpc CheckAvailable(CheckRequest)         returns (CashierResponse);
}

message DepositRequest       { string trader   = 1; int64  amount   = 2; }
message WithdrawRequest      { string trader   = 1; int64  amount   = 2; }
message EscrowRequest        { string trader   = 1; uint32 order_id = 2; int64 amount = 3; }
message ReleaseEscrowRequest { uint32 order_id = 1; }
message CheckRequest         { string trader   = 1; }

// Returned by every RPC: full account snapshot after the operation.
message CashierResponse {
    int64 balance   = 1;  // total deposited (gross)
    int64 locked    = 2;  // currently escrowed
    int64 available = 3;  // balance - locked
}
