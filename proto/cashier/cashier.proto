syntax = "proto3";
package cashier;

option go_package = "github.com/secwager/secwager/proto/gen/cashier";

service CashierService {
    rpc Deposit        (DepositRequest)        returns (CashierResponse);
    rpc Withdraw       (WithdrawRequest)       returns (CashierResponse);
    rpc Escrow         (EscrowRequest)         returns (CashierResponse);
    rpc ReleaseEscrow  (ReleaseEscrowRequest)  returns (CashierResponse);
    rpc CheckAvailable (CheckRequest)          returns (CashierResponse);
    rpc DepositEscrowed(DepositEscrowedRequest) returns (CashierResponse);
    rpc ConfirmDeposit (ConfirmDepositRequest)  returns (CashierResponse);
}

message DepositRequest {
    string user_id          = 1;
    int64  amount           = 2;
    string idempotency_key  = 3;
}

message WithdrawRequest {
    string user_id          = 1;
    int64  amount           = 2;
    string idempotency_key  = 3;
}

message EscrowRequest {
    string user_id   = 1;
    uint32 order_id  = 2;
    int64  amount    = 3;
}

message ReleaseEscrowRequest {
    uint32 order_id = 1;
}

message CheckRequest {
    string user_id = 1;
}

message DepositEscrowedRequest {
    string user_id     = 1;
    int64  amount      = 2;
    string deposit_ref = 3;  // txid:vout — idempotency key
}

message ConfirmDepositRequest {
    string user_id     = 1;
    int64  amount      = 2;  // caller supplies amount; no escrow_entries lookup needed
    string deposit_ref = 3;  // idempotency key: stored as "confirm:"+deposit_ref internally
}

// Returned by every RPC. Spendable = gross_balance - escrowed.
// is_replay is true when the request was deduplicated via an idempotency key.
message CashierResponse {
    int64 gross_balance = 1;
    int64 escrowed      = 2;
    bool  is_replay     = 3;
}
