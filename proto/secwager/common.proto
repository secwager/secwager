syntax = "proto3";
package secwager;
option go_package = "github.com/secwager/secwager/proto/gen/secwager";

enum Side { BUY = 0; SELL = 1; }

// Published to incoming_orders by order_gateway; consumed by market.
message Order {
  string symbol = 1;
  string trader = 2;   // max 8 chars → engine Order::trader
  uint32 price  = 3;   // t_price (1–65535)
  uint32 size   = 4;   // t_size
  Side   side   = 5;
}

// Published to incoming_orders by order_gateway for cancel requests.
message CancelRequest {
  string symbol   = 1;
  uint32 order_id = 2;
}

// Wrapper: either a new order or a cancel — keyed by symbol on the topic.
message MarketCommand {
  oneof command {
    Order         new_order = 1;
    CancelRequest cancel    = 2;
  }
}

enum ExecType {
  ORDER_ACCEPTED  = 0;  // resting in book; qty_filled=0
  ORDER_FILLED    = 1;  // fill occurred; qty_remaining=0 means fully matched
  ORDER_CANCELLED = 2;
  ORDER_REJECTED  = 3;
}

enum RejectReason {
  REJECT_REASON_UNSPECIFIED = 0;
  ORDER_ALREADY_FILLED      = 1;  // cancel: slot exists but qty=0 (fully matched)
  ORDER_NOT_FOUND           = 2;  // cancel: ID not in pool at all
}

// Single message for all order lifecycle events. Published to order_executions.
// On a fill, two reports are emitted — one per side. matched_against carries
// all counterparty traders for this order's fills up to this event.
message ExecutionReport {
  string       symbol          = 1;
  string       trader          = 2;
  uint32       order_id        = 3;
  ExecType     exec_type       = 4;
  uint32       qty_filled      = 5;  // cumulative; 0 if exec_type != ORDER_FILLED
  uint32       qty_remaining   = 6;
  uint32       fill_price      = 7;  // price of most recent fill; 0 if not ORDER_FILLED
  repeated string matched_against = 8;  // counterparty traders (all fills so far)
  RejectReason reject_reason   = 9;  // set only when exec_type=ORDER_REJECTED
}
