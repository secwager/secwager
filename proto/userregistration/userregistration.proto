syntax = "proto3";
package userregistration;
option go_package = "github.com/secwager/secwager/proto/gen/userregistration";

service UserRegistrationService {
  rpc CompleteRegistration (CompleteRegistrationRequest)  returns (CompleteRegistrationResponse);
  rpc GetUser              (GetUserRequest)               returns (GetUserResponse);
}

message CompleteRegistrationRequest {
  string cognito_sub = 1;
  string username    = 2;
  string email       = 3;
}

message CompleteRegistrationResponse {
  string user_id    = 1;
  string username   = 2;
  bytes  btc_pubkey = 3;
  string btc_addr   = 4;
}

message GetUserRequest {
  string username = 1;
}

message GetUserResponse {
  string user_id    = 1;
  string username   = 2;
  bytes  btc_pubkey = 3;
  string btc_addr   = 4;
}
